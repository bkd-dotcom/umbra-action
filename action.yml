name: "Umbra Admission"
description: "Govern any coding agent's change with the Umbra admission pipeline and attach a signed receipt. Works for PRs opened by Claude Code, Codex, Cursor, Copilot, Devin, or a human."
author: "Binay Dalai"
branding:
  icon: "shield"
  color: "purple"

inputs:
  mission:
    description: "The bounded task the change claims to perform (used as the agent mission / review context)."
    required: false
    default: "Review this pull request's change for scope, introduced secrets, and injected repository instructions."
  min-authority:
    description: "Minimum earned authority level required to pass (0 observe, 1 analyze, 2 branch-PR)."
    required: false
    default: "1"
  agent:
    description: "Force a specific executor (codex-cli | claude-code) to re-run the change. Leave blank to govern the existing PR diff without invoking an agent."
    required: false
    default: ""
  signing-key:
    description: "Base64 Ed25519 signing key (32+ bytes) for stable receipts. Falls back to an honestly-flagged dev key if unset."
    required: false
    default: ""
  umbra-version:
    description: "Version of umbra-core to install from PyPI (e.g. '0.1.0'). Blank installs the latest."
    required: false
    default: ""
  require-sandbox:
    description: "If 'true', code-executing checks (npm/pip install, go/cargo build) are refused unless a real filesystem/network sandbox is available (fail closed)."
    required: false
    default: "false"
  python-version:
    description: "Python version to run on."
    required: false
    default: "3.12"

outputs:
  authority-level:
    description: "The authority level the change earned (0/1/2)."
    value: ${{ steps.admit.outputs.authority_level }}
  receipt-hash:
    description: "The canonical hash of the signed receipt."
    value: ${{ steps.admit.outputs.receipt_hash }}

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Enable filesystem/network sandbox (bubblewrap) on Linux
      shell: bash
      run: |
        # Real check isolation (the 'sandboxed' enforcement tier) needs bubblewrap
        # AND unprivileged user namespaces. Ubuntu 24.04 (GitHub runners) restricts
        # unprivileged userns via AppArmor by default, which makes bwrap fail its
        # preflight and Umbra honestly fall back to host-restricted. We install
        # bwrap and relax the userns clamp so the sandbox can initialize. All
        # non-fatal: if anything fails, Umbra records the true (lower) tier.
        if [ "$(uname -s)" = "Linux" ]; then
          if ! command -v bwrap >/dev/null 2>&1 && command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update -qq && sudo apt-get install -y -qq bubblewrap || \
              echo "::warning::Could not install bubblewrap."
          fi
          # Allow unprivileged user namespaces (needed by bwrap on Ubuntu 23.10+).
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 >/dev/null 2>&1 || true
          sudo sysctl -w kernel.unprivileged_userns_clone=1 >/dev/null 2>&1 || true
        fi
        if command -v bwrap >/dev/null 2>&1; then
          echo "bubblewrap installed. Umbra will preflight it at check time and record the true tier (sandboxed if it initializes, else network-isolated/host-restricted)."
        else
          echo "::notice::bubblewrap not installed on this runner — required checks will use the strongest tier that preflights, recorded truthfully in the receipt."
        fi

    - name: Install umbra-core
      shell: bash
      env:
        IN_UMBRA_VERSION: ${{ inputs.umbra-version }}
      run: |
        set -euo pipefail
        VER="${IN_UMBRA_VERSION:-}"
        if [ -n "$VER" ]; then
          # Validate: PEP 440-ish version, no shell metacharacters.
          case "$VER" in
            *[!0-9.a-zA-Z_-]*) echo "::error::Invalid umbra-version '$VER'"; exit 1 ;;
          esac
          pip install "umbra-core==$VER"
        else
          # Pin a hardened minimum by default (contains the security fixes).
          pip install "umbra-core>=0.1.3"
        fi

    - name: Stage the PR change as a working-tree diff
      shell: bash
      env:
        BASE_SHA: ${{ github.event.pull_request.base.sha }}
      run: |
        # umbra evaluates the working-tree diff (git diff vs HEAD). For a PR we
        # soft-reset to the base commit but keep the PR's changes in the working
        # tree, so `git diff` shows exactly what the agent proposed against base.
        # Fail closed if we can't reach the base — otherwise admission would see
        # an empty diff and wave the PR through (a silent no-op gate).
        if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
          git fetch --no-tags origin "$BASE_SHA" || {
            echo "::error::Cannot fetch base $BASE_SHA. Set 'fetch-depth: 0' on actions/checkout."; exit 1; }
          git reset --soft "$BASE_SHA" && git restore --staged . || {
            echo "::error::Cannot soft-reset to base $BASE_SHA."; exit 1; }
          if [ -z "$(git diff --name-only)" ]; then
            echo "::warning::Working-tree diff against base is empty; the PR appears to change no files."
          fi
        fi

    - name: Run admission
      id: admit
      shell: bash
      env:
        # Pass inputs via env — NEVER interpolate ${{ inputs.* }} into a bash body
        # (that is the GitHub Actions script-injection sink; a PR title/branch
        # plumbed into `mission` could otherwise execute arbitrary code).
        UMBRA_SIGNING_KEY: ${{ inputs.signing-key }}
        IN_MISSION: ${{ inputs.mission }}
        IN_AGENT: ${{ inputs.agent }}
        IN_MIN_AUTHORITY: ${{ inputs.min-authority }}
        UMBRA_ENABLE_CLAUDE_CODE: ${{ inputs.agent == 'claude-code' && 'true' || 'false' }}
        UMBRA_ENABLE_CODEX_CLI: ${{ inputs.agent == 'codex-cli' && 'true' || 'false' }}
        UMBRA_REQUIRE_SANDBOX: ${{ inputs.require-sandbox == 'true' && 'true' || 'false' }}
      run: |
        set -euo pipefail
        # Validate untrusted inputs against fixed sets before use.
        case "${IN_AGENT:-}" in
          ""|none) AGENT_ARG="--agent none" ;;
          codex-cli|claude-code) AGENT_ARG="--agent ${IN_AGENT}" ;;
          *) echo "::error::Invalid agent '${IN_AGENT}' (expected codex-cli|claude-code)"; exit 1 ;;
        esac
        case "${IN_MIN_AUTHORITY:-1}" in
          0|1|2) MIN="${IN_MIN_AUTHORITY}" ;;
          *) echo "::error::Invalid min-authority '${IN_MIN_AUTHORITY}' (expected 0|1|2)"; exit 1 ;;
        esac
        OUT="${RUNNER_TEMP:-/tmp}/umbra"
        mkdir -p "$OUT"
        echo "OUT=$OUT" >> "$GITHUB_ENV"
        umbra --json admit . \
          --mission "$IN_MISSION" \
          --label "${GITHUB_REPOSITORY}" \
          $AGENT_ARG \
          --min-authority "$MIN" \
          --receipt-out "$OUT/umbra-receipt.json" > "$OUT/umbra-report.json" || echo "ADMIT_FAILED=1" >> "$GITHUB_ENV"

        LEVEL=$(python -c "import json;print(json.load(open('$OUT/umbra-report.json'))['report']['authority_level'])" 2>/dev/null || echo 0)
        HASH=$(python -c "import json;print(json.load(open('$OUT/umbra-report.json'))['receipt']['canonical_hash'])" 2>/dev/null || echo "")
        echo "authority_level=$LEVEL" >> "$GITHUB_OUTPUT"
        echo "receipt_hash=$HASH" >> "$GITHUB_OUTPUT"

    - name: Upload receipt artifact
      if: always()
      uses: actions/upload-artifact@v5
      with:
        name: umbra-receipt
        path: |
          ${{ env.OUT }}/umbra-receipt.json
          ${{ env.OUT }}/umbra-report.json
        if-no-files-found: ignore

    - name: Comment the verdict on the PR
      if: always() && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const path = require('path');
          const out = process.env.OUT || '';
          let report = {};
          try { report = JSON.parse(fs.readFileSync(path.join(out, 'umbra-report.json'),'utf8')).report; } catch (e) {}
          const r = report || {};
          const cr = r.contract_result || {};
          const tb = r.trust_boundary || {};
          const v = r.verifier || {};
          const badge = { 0: '🔴 Observe (L0)', 1: '🟡 Analyze (L1)', 2: '🟢 Branch-PR (L2)' }[r.authority_level] || '—';
          const body = [
            '## Umbra Admission',
            '',
            `**Earned authority:** ${badge}`,
            '',
            `- **Executor:** \`${r.executor || 'n/a'}\``,
            `- **Contract:** ${cr.passed ? 'PASS' : 'VIOLATED'}`,
            `- **Trust boundary:** ${tb.clean ? 'clean' : `${tb.quarantined_count} injected line(s) quarantined on disk`}`,
            `- **Independent verifier:** ${v.blocked ? 'BLOCKED' : (v.status || 'n/a')}`,
            `- **Outcome:** ${r.outcome || ''}`,
            '',
            `> Signed receipt attached as the \`umbra-receipt\` artifact. \`auto_merge\` is always false — a human merges. Umbra governs the agent; it never merges.`,
          ].join('\n');
          if (context.issue.number) {
            await github.rest.issues.createComment({ ...context.repo, issue_number: context.issue.number, body });
          }

    - name: Enforce the authority gate
      if: always()
      shell: bash
      env:
        LEVEL: ${{ steps.admit.outputs.authority_level }}
        MIN: ${{ inputs.min-authority }}
      run: |
        # Validate before the numeric comparison (defense against injected values).
        case "${MIN:-1}" in 0|1|2) : ;; *) echo "::error::Invalid min-authority"; exit 1 ;; esac
        case "${LEVEL:-0}" in 0|1|2) : ;; *) LEVEL=0 ;; esac
        echo "umbra: earned L$LEVEL, required >= L$MIN"
        if [ "${LEVEL:-0}" -lt "${MIN:-1}" ]; then
          echo "::error::Umbra: the change earned only L$LEVEL (required L$MIN). See the receipt artifact."
          exit 1
        fi
